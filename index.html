<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>US Stocks Pro | Real API</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #0b0e14; color: #d1d4dc; font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; padding: 0; }
        .glass-panel { background: rgba(30, 34, 45, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 4px; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="w-screen flex flex-col overflow-hidden">

    <header class="glass-panel w-full flex items-center justify-between px-4 py-3 md:px-6 md:py-4 z-10 shrink-0 border-b border-gray-800">
        <div class="flex items-center gap-3">
            <i class="ph-fill ph-chart-line-up text-2xl md:text-3xl text-blue-500"></i>
            <div>
                <h1 class="text-lg md:text-xl font-bold text-white tracking-wide leading-tight">US Stocks Pro</h1>
                <p class="text-[10px] md:text-xs text-green-400">Stable API (Alpha Vantage)</p>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col md:flex-row relative overflow-y-auto md:overflow-hidden">
        
        <aside class="glass-panel w-full md:w-80 p-4 md:p-5 flex flex-col gap-4 md:gap-6 shrink-0 z-10 border-b md:border-b-0 md:border-r border-gray-800 md:overflow-y-auto">
            
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider">ค้นหาหุ้น</label>
                <input type="text" id="symbolInput" value="AAPL" placeholder="เช่น AAPL, TSLA, MSFT" class="w-full bg-[#131722] border border-gray-700 text-white rounded-lg px-3 py-2.5 md:px-4 md:py-3 text-base md:text-lg font-bold uppercase transition-all">
            </div>

            <button id="loadBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-3 rounded-lg transition-all shadow-lg shadow-blue-900/20 flex justify-center items-center gap-2 text-sm md:text-base">
                <i class="ph-bold ph-magnifying-glass"></i> โหลดกราฟ
            </button>

            <!-- Message Box -->
            <div id="msgBox" class="hidden text-sm p-3 rounded-lg flex items-start gap-2 border">
                <i id="msgIcon" class="ph-fill text-lg shrink-0 mt-0.5"></i>
                <span id="msgText" class="text-xs md:text-sm leading-relaxed"></span>
            </div>

            <hr class="border-gray-800 my-1 md:my-2 hidden md:block">

            <div class="flex flex-col gap-3 md:gap-4">
                <button id="toggleSR" class="flex items-center justify-between w-full bg-[#2a2e39] border border-gray-700 text-white px-3 py-2.5 md:px-4 md:py-3 rounded-lg transition-all">
                    <div class="flex items-center gap-2">
                        <i class="ph ph-ruler text-lg md:text-xl text-blue-400"></i>
                        <span class="font-medium text-xs md:text-sm" id="toggleSRText">ซ่อนแนวรับ-แนวต้าน</span>
                    </div>
                    <div id="toggleIndicator" class="w-10 h-5 bg-blue-500 rounded-full p-1 transition-colors relative">
                        <div class="w-3 h-3 bg-white rounded-full absolute right-1 transition-all"></div>
                    </div>
                </button>

                <div class="bg-[#131722] p-3 md:p-4 rounded-lg border border-gray-800">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs text-gray-500">ราคาปิดล่าสุด:</span>
                        <span class="text-sm font-bold text-white" id="statClose">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500">แนวต้าน:</span>
                        <span class="text-sm font-bold text-red-400" id="statRes">-</span>
                    </div>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-xs text-gray-500">แนวรับ:</span>
                        <span class="text-sm font-bold text-green-400" id="statSup">-</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Chart Container -->
        <div class="flex-grow relative bg-[#131722] min-h-[400px] w-full" id="chartContainer">
            <div id="loadingOverlay" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-[#131722]/90 hidden">
                <i class="ph-bold ph-spinner-gap text-4xl text-blue-500 animate-spin mb-3"></i>
                <p class="text-white text-sm font-medium">กำลังโหลด...</p>
            </div>
        </div>

    </main>

    <script>
        // ใช้ตัวแปร Global
        let chart = null;
        let candlestickSeries = null;
        let chartData = [];
        let srLines = [];
        let isSRVisible = true;

        // API Key ของ Alpha Vantage (ใช้สำหรับทดสอบฟรี)
        const API_KEY = 'demo'; 

        function initChart() {
            const container = document.getElementById('chartContainer');
            
            // สร้างกราฟ
            chart = LightweightCharts.createChart(container, {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: 'rgba(42, 46, 57, 0.3)' }, horzLines: { color: 'rgba(42, 46, 57, 0.3)' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.4)' },
                timeScale: { borderColor: 'rgba(197, 203, 206, 0.4)', timeVisible: false },
            });

            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350',
            });

            // รองรับหน้าจอมือถือ
            new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== container) return;
                const newRect = entries[0].contentRect;
                let height = newRect.height > 0 ? newRect.height : 400;
                chart.applyOptions({ width: newRect.width, height: height });
            }).observe(container);
        }

        async function fetchMarketData(symbol) {
            // ดึงข้อมูลรายวัน ย้อนหลัง 100 วันจาก Alpha Vantage (API เสถียร)
            const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`;
            
            const response = await fetch(url);
            const data = await response.json();

            if (data['Error Message']) {
                throw new Error('ไม่พบข้อมูลหุ้นตัวนี้');
            }
            if (data['Note'] || data['Information']) {
                throw new Error('API ถึงขีดจำกัด (Rate Limit) กรุณารอสักครู่แล้วลองใหม่');
            }

            const timeSeries = data['Time Series (Daily)'];
            if (!timeSeries) throw new Error('เกิดข้อผิดพลาดในการรับข้อมูล');

            let formattedData = [];
            
            // วนลูปอ่านข้อมูลและจัดรูปแบบให้ Lightweight Charts
            for (let dateStr in timeSeries) {
                let dayData = timeSeries[dateStr];
                formattedData.push({
                    time: dateStr,
                    open: parseFloat(dayData['1. open']),
                    high: parseFloat(dayData['2. high']),
                    low: parseFloat(dayData['3. low']),
                    close: parseFloat(dayData['4. close'])
                });
            }

            // Alpha Vantage เรียงจากใหม่ไปเก่า ต้องสลับกลับ (เก่าไปใหม่)
            return formattedData.reverse();
        }

        function calculateSR(data) {
            let levels = [];
            let lookback = 10; 
            for (let i = lookback; i < data.length - lookback; i++) {
                let isHigh = true; let isLow = true;
                for (let j = 1; j <= lookback; j++) {
                    if (data[i-j].high > data[i].high || data[i+j].high > data[i].high) isHigh = false;
                    if (data[i-j].low < data[i].low || data[i+j].low < data[i].low) isLow = false;
                }
                if (isHigh) levels.push({ type: 'res', price: data[i].high });
                if (isLow) levels.push({ type: 'sup', price: data[i].low });
            }
            
            let filtered = [];
            levels.reverse().forEach(lvl => {
                if (!filtered.some(f => f.type === lvl.type && Math.abs(f.price - lvl.price) / f.price < 0.03)) {
                    filtered.push(lvl);
                }
            });

            return {
                sup: filtered.filter(l => l.type === 'sup').slice(0, 2).map(l => l.price),
                res: filtered.filter(l => l.type === 'res').slice(0, 2).map(l => l.price)
            };
        }

        function drawLines() {
            srLines.forEach(line => candlestickSeries.removePriceLine(line));
            srLines = [];
            document.getElementById('statRes').innerText = '-';
            document.getElementById('statSup').innerText = '-';

            if (!isSRVisible || chartData.length === 0) return;

            const { sup, res } = calculateSR(chartData);

            sup.forEach(price => {
                let l = candlestickSeries.createPriceLine({ price: price, color: '#00e676', lineWidth: 2, lineStyle: 2 });
                srLines.push(l);
            });
            res.forEach(price => {
                let l = candlestickSeries.createPriceLine({ price: price, color: '#ff5252', lineWidth: 2, lineStyle: 2 });
                srLines.push(l);
            });

            if(res.length > 0) document.getElementById('statRes').innerText = Math.min(...res).toFixed(2);
            if(sup.length > 0) document.getElementById('statSup').innerText = Math.max(...sup).toFixed(2);
        }

        function showMessage(type, text) {
            const msgBox = document.getElementById('msgBox');
            msgBox.className = 'text-sm p-3 rounded-lg flex items-start gap-2 border';
            msgBox.classList.remove('hidden');
            document.getElementById('msgText').innerText = text;

            if (type === 'error') {
                msgBox.classList.add('bg-red-900/30', 'border-red-500/50', 'text-red-400');
                document.getElementById('msgIcon').className = 'ph-fill ph-warning-circle text-lg text-red-500 mt-0.5';
            }
        }

        async function doLoad() {
            let symbol = document.getElementById('symbolInput').value.trim().toUpperCase();
            if(!symbol) return;
            // API Demo Key รองรับแค่ IBM เป็นหลัก ถ้าไม่ได้ให้พยายามลองพิมพ์ IBM
            // แต่จริงๆ จะทำงานได้กับบางหุ้นยอดฮิต

            document.getElementById('msgBox').classList.add('hidden');
            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('statClose').innerText = '-';

            try {
                chartData = await fetchMarketData(symbol);
                candlestickSeries.setData(chartData);
                chart.timeScale().fitContent();
                
                document.getElementById('statClose').innerText = chartData[chartData.length - 1].close.toFixed(2);
                drawLines();
            } catch(e) {
                console.error(e);
                showMessage('error', e.message);
                
                // ถ้าระบบจริงล่ม สร้างกราฟหลอกให้ดู 1 ครั้ง เพื่อให้รู้ว่า Canvas ทำงาน
                if(chartData.length === 0) {
                     let dummyData = [];
                     let d = new Date(); d.setDate(d.getDate() - 100);
                     let p = 150;
                     for(let i=0; i<100; i++) {
                         d.setDate(d.getDate()+1);
                         if(d.getDay()===0||d.getDay()===6) continue;
                         let o=p, c=o+(Math.random()-0.5)*5, h=Math.max(o,c)+Math.random()*2, l=Math.min(o,c)-Math.random()*2;
                         dummyData.push({time: d.toISOString().split('T')[0], open:o, high:h, low:l, close:c});
                         p=c;
                     }
                     chartData = dummyData;
                     candlestickSeries.setData(chartData);
                     chart.timeScale().fitContent();
                     showMessage('error', e.message + " (แสดงกราฟจำลองแทน)");
                     drawLines();
                }

            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        // เริ่มการทำงาน
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            
            // ลองดึงข้อมูลหุ้น IBM ก่อน (เพราะ API Demo นี้รองรับ IBM 100%)
            document.getElementById('symbolInput').value = 'IBM';
            setTimeout(doLoad, 300);

            document.getElementById('loadBtn').addEventListener('click', doLoad);
            document.getElementById('symbolInput').addEventListener('keypress', e => { if(e.key === 'Enter') { e.target.blur(); doLoad(); }});

            document.getElementById('toggleSR').addEventListener('click', () => {
                isSRVisible = !isSRVisible;
                let ind = document.getElementById('toggleIndicator');
                let dot = ind.querySelector('div');
                let txt = document.getElementById('toggleSRText');

                if (isSRVisible) {
                    ind.className = 'w-10 h-5 bg-blue-500 rounded-full p-1 transition-colors relative';
                    dot.className = 'w-3 h-3 bg-white rounded-full absolute right-1 transition-all';
                    txt.innerText = 'ซ่อนแนวรับ-แนวต้าน';
                } else {
                    ind.className = 'w-10 h-5 bg-gray-600 rounded-full p-1 transition-colors relative';
                    dot.className = 'w-3 h-3 bg-white rounded-full absolute left-1 transition-all';
                    txt.innerText = 'แสดงแนวรับ-แนวต้าน';
                }
                drawLines();
            });
        });

    </script>
</body>
</html>
