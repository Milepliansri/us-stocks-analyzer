<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>US Stocks Pro | Smart Search</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <!-- โหลด Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* ใช้ 100dvh เพื่อแก้ปัญหาหน้าจอมือถือที่มีแถบ URL */
        body { background-color: #0b0e14; color: #d1d4dc; font-family: 'Inter', sans-serif; height: 100dvh; }
        .glass-panel { background: rgba(30, 34, 45, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 4px; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="w-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="glass-panel w-full flex items-center justify-between px-4 py-3 md:px-6 md:py-4 z-10 shrink-0 border-b border-gray-800">
        <div class="flex items-center gap-3">
            <i class="ph-fill ph-chart-line-up text-2xl md:text-3xl text-blue-500"></i>
            <div>
                <h1 class="text-lg md:text-xl font-bold text-white tracking-wide leading-tight">US Stocks Pro</h1>
                <p class="text-[10px] md:text-xs text-gray-400">Yahoo Finance (Auto-Proxy)</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col md:flex-row relative overflow-y-auto md:overflow-hidden">
        
        <!-- Controls Sidebar -->
        <aside class="glass-panel w-full md:w-80 p-4 md:p-5 flex flex-col gap-4 md:gap-6 shrink-0 z-10 border-b md:border-b-0 md:border-r border-gray-800 md:overflow-y-auto">
            
            <!-- Smart Search Input -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider">ค้นหาหุ้น (พิมพ์ชื่อหรือตัวย่อ)</label>
                <div class="relative">
                    <input type="text" list="stock-list" id="symbolInput" value="AAPL" placeholder="เช่น Apple, TSLA, SPY" class="w-full bg-[#131722] border border-gray-700 text-white rounded-lg px-3 py-2.5 md:px-4 md:py-3 text-base md:text-lg font-bold transition-all placeholder:text-sm placeholder:font-normal placeholder:text-gray-600">
                    <datalist id="stock-list"></datalist>
                </div>
            </div>

            <!-- Time Range -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider">ช่วงเวลา</label>
                <select id="rangeSelect" class="w-full bg-[#131722] border border-gray-700 text-white rounded-lg px-3 py-2.5 md:px-4 md:py-3 text-sm md:text-base outline-none focus:border-blue-500 transition-colors cursor-pointer">
                    <option value="3mo">3 เดือนย้อนหลัง</option>
                    <option value="6mo">6 เดือนย้อนหลัง</option>
                    <option value="1y" selected>1 ปี ย้อนหลัง</option>
                    <option value="2y">2 ปี ย้อนหลัง</option>
                </select>
            </div>

            <button id="loadBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-3 rounded-lg transition-all shadow-lg shadow-blue-900/20 flex justify-center items-center gap-2 text-sm md:text-base">
                <i class="ph-bold ph-magnifying-glass"></i> ดูข้อมูลกราฟ
            </button>

            <!-- Error/Warning Message Box -->
            <div id="msgBox" class="hidden text-sm p-3 rounded-lg flex items-start gap-2 border">
                <i id="msgIcon" class="ph-fill text-lg shrink-0 mt-0.5"></i>
                <span id="msgText" class="text-xs md:text-sm leading-relaxed"></span>
            </div>

            <hr class="border-gray-800 my-1 md:my-2 hidden md:block">

            <!-- Tools & Toggles -->
            <div class="flex flex-col gap-3 md:gap-4">
                <button id="toggleSR" class="flex items-center justify-between w-full bg-[#2a2e39] hover:bg-[#323744] border border-gray-700 text-white px-3 py-2.5 md:px-4 md:py-3 rounded-lg transition-all">
                    <div class="flex items-center gap-2">
                        <i class="ph ph-ruler text-lg md:text-xl text-blue-400"></i>
                        <span class="font-medium text-xs md:text-sm" id="toggleSRText">ซ่อนแนวรับ-แนวต้าน</span>
                    </div>
                    <div id="toggleIndicator" class="w-10 h-5 bg-blue-500 rounded-full p-1 transition-colors relative">
                        <div class="w-3 h-3 bg-white rounded-full absolute right-1 transition-all"></div>
                    </div>
                </button>

                <div class="bg-[#131722] p-3 md:p-4 rounded-lg border border-gray-800">
                    <h4 class="text-[10px] md:text-xs font-bold text-gray-400 mb-2">ข้อมูลสถิติปัจจุบัน</h4>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs text-gray-500">ราคาปิดล่าสุด:</span>
                        <span class="text-sm font-bold text-white" id="statClose">-</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500">แนวต้านล่าสุด:</span>
                        <span class="text-sm font-bold text-red-400" id="statRes">-</span>
                    </div>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-xs text-gray-500">แนวรับล่าสุด:</span>
                        <span class="text-sm font-bold text-green-400" id="statSup">-</span>
                    </div>
                </div>
            </div>

        </aside>

        <!-- Chart Area (กำหนด min-height ให้มือถือเพื่อไม่ให้กราฟแบน) -->
        <div class="flex-grow relative bg-[#131722] min-h-[400px] md:min-h-0 w-full" id="chartContainer">
            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-[#131722]/80 backdrop-blur-sm hidden">
                <i class="ph-bold ph-circle-notch text-4xl md:text-5xl text-blue-500 animate-spin mb-3"></i>
                <p class="text-white text-sm md:text-base font-medium animate-pulse" id="loadingText">กำลังดึงข้อมูล...</p>
            </div>
        </div>

    </main>

    <script>
        const popularStocks = {
            "AAPL": "Apple", "MSFT": "Microsoft", "NVDA": "NVIDIA", "GOOGL": "Alphabet",
            "AMZN": "Amazon", "META": "Meta", "TSLA": "Tesla", "SPY": "S&P 500 ETF", "BTC-USD": "Bitcoin"
        };

        let chart;
        let candlestickSeries;
        let currentData = [];
        let srLines = [];
        let isSRVisible = true;

        function initChart() {
            const container = document.getElementById('chartContainer');
            chart = LightweightCharts.createChart(container, {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: 'rgba(42, 46, 57, 0.3)' }, horzLines: { color: 'rgba(42, 46, 57, 0.3)' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.4)' },
                timeScale: { borderColor: 'rgba(197, 203, 206, 0.4)', timeVisible: false },
            });

            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350',
            });

            new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== container) return;
                const newRect = entries[0].contentRect;
                // ป้องกันกราฟความสูงเป็น 0 ในมือถือ
                let height = newRect.height > 0 ? newRect.height : 400;
                chart.applyOptions({ height: height, width: newRect.width });
            }).observe(container);
        }

        // ฟังก์ชันดึงข้อมูลแบบมี Timeout ป้องกันอาการค้าง
        async function fetchWithTimeout(url, options = {}, timeoutMs = 5000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (err) {
                clearTimeout(id);
                throw err;
            }
        }

        // สร้างข้อมูลจำลอง (Fallback) เผื่อกรณีเน็ตมือถือมีปัญหา หรือ Proxy ล่มหมด
        function generateMockData(days = 150) {
            let data = [];
            let price = 150 + (Math.random() * 50);
            let time = new Date();
            time.setDate(time.getDate() - days);

            for (let i = 0; i < days; i++) {
                if (time.getDay() === 0 || time.getDay() === 6) { time.setDate(time.getDate() + 1); continue; }
                let open = price;
                let change = open * 0.03 * (Math.random() - 0.48);
                let close = open + change;
                let high = Math.max(open, close) + (Math.abs(change) * Math.random());
                let low = Math.min(open, close) - (Math.abs(change) * Math.random());
                
                data.push({
                    time: time.toISOString().split('T')[0],
                    open: parseFloat(open.toFixed(2)), high: parseFloat(high.toFixed(2)),
                    low: parseFloat(low.toFixed(2)), close: parseFloat(close.toFixed(2))
                });
                price = close;
                time.setDate(time.getDate() + 1);
            }
            return data;
        }

        async function fetchRealMarketData(symbol, range) {
            const yfUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=${range}`;
            
            // อัปเดตรายชื่อ Proxy ที่ใช้งานได้จริงบน GitHub Pages
            const proxies = [
                `https://corsproxy.io/?${encodeURIComponent(yfUrl)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`
            ];

            let yfData = null;

            for (let proxyUrl of proxies) {
                try {
                    // ใช้เวลาลอง Proxy ละ 6 วินาที ถ้าเกินแปลว่าค้าง ให้สลับไปตัวถัดไป
                    const response = await fetchWithTimeout(proxyUrl, {}, 6000);
                    if (response.ok) {
                        const text = await response.text();
                        try {
                            yfData = JSON.parse(text);
                            if (yfData && yfData.chart && yfData.chart.result) break; 
                        } catch(e) { continue; }
                    }
                } catch (err) {
                    console.warn(`Proxy timeout or failed, trying next...`);
                }
            }

            // ถ้าดึงข้อมูลจริงไม่ได้เลย ให้โยน Error ออกไปเพื่อใช้ Mock Data
            if (!yfData || !yfData.chart || !yfData.chart.result || yfData.chart.result.length === 0) {
                throw new Error('PROXY_FAILED');
            }

            const result = yfData.chart.result[0];
            const timestamps = result.timestamp;
            const quote = result.indicators.quote[0];
            
            let chartData = [];
            for (let i = 0; i < timestamps.length; i++) {
                if (quote.open[i] !== null && quote.close[i] !== null) {
                    const dateStr = new Date(timestamps[i] * 1000).toISOString().split('T')[0];
                    if(chartData.length > 0 && chartData[chartData.length-1].time === dateStr) continue;
                    chartData.push({
                        time: dateStr,
                        open: parseFloat(quote.open[i].toFixed(2)), high: parseFloat(quote.high[i].toFixed(2)),
                        low: parseFloat(quote.low[i].toFixed(2)), close: parseFloat(quote.close[i].toFixed(2))
                    });
                }
            }
            return chartData;
        }

        function calculateSupportResistance(data) {
            let levels = [];
            let lookback = 12; 
            for (let i = lookback; i < data.length - lookback; i++) {
                let isSwingHigh = true; let isSwingLow = true;
                for (let j = 1; j <= lookback; j++) {
                    if (data[i - j].high > data[i].high || data[i + j].high > data[i].high) isSwingHigh = false;
                    if (data[i - j].low < data[i].low || data[i + j].low < data[i].low) isSwingLow = false;
                }
                if (isSwingHigh) levels.push({ type: 'resistance', price: data[i].high });
                if (isSwingLow) levels.push({ type: 'support', price: data[i].low });
            }
            let filteredLevels = [];
            let threshold = 0.025; 
            levels.reverse().forEach(level => {
                let isTooClose = filteredLevels.some(f => f.type === level.type && Math.abs(f.price - level.price) / f.price < threshold);
                if (!isTooClose) filteredLevels.push(level);
            });
            let supports = filteredLevels.filter(l => l.type === 'support').slice(0, 2).map(l => l.price);
            let resistances = filteredLevels.filter(l => l.type === 'resistance').slice(0, 2).map(l => l.price);
            return { supports, resistances };
        }

        function drawSRLines() {
            srLines.forEach(line => candlestickSeries.removePriceLine(line));
            srLines = [];
            const statRes = document.getElementById('statRes');
            const statSup = document.getElementById('statSup');
            statRes.innerText = '-'; statSup.innerText = '-';

            if (!isSRVisible || currentData.length === 0) return;

            const { supports, resistances } = calculateSupportResistance(currentData);

            supports.forEach(price => {
                const line = candlestickSeries.createPriceLine({
                    price: price, color: '#00e676', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'Support',
                });
                srLines.push(line);
            });
            resistances.forEach(price => {
                const line = candlestickSeries.createPriceLine({
                    price: price, color: '#ff5252', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'Resistance',
                });
                srLines.push(line);
            });
            if(resistances.length > 0) statRes.innerText = Math.min(...resistances).toFixed(2);
            if(supports.length > 0) statSup.innerText = Math.max(...supports).toFixed(2);
        }

        function showMessage(type, text) {
            const msgBox = document.getElementById('msgBox');
            const msgIcon = document.getElementById('msgIcon');
            const msgText = document.getElementById('msgText');
            
            msgBox.className = 'text-sm p-3 rounded-lg flex items-start gap-2 border'; // reset
            msgBox.classList.remove('hidden');
            msgText.innerText = text;

            if (type === 'error') {
                msgBox.classList.add('bg-red-900/30', 'border-red-500/50', 'text-red-400');
                msgIcon.className = 'ph-fill ph-warning-circle text-lg shrink-0 mt-0.5 text-red-500';
            } else if (type === 'warning') {
                msgBox.classList.add('bg-yellow-900/30', 'border-yellow-500/50', 'text-yellow-400');
                msgIcon.className = 'ph-fill ph-warning text-lg shrink-0 mt-0.5 text-yellow-500';
            }
        }

        async function loadStock() {
            const symbolInput = document.getElementById('symbolInput');
            let rawSymbol = symbolInput.value.trim().toUpperCase();
            if(!rawSymbol) return;

            let symbol = rawSymbol.split(' ')[0]; 
            symbolInput.value = symbol; 

            const range = document.getElementById('rangeSelect').value;
            const overlay = document.getElementById('loadingOverlay');
            const statClose = document.getElementById('statClose');
            
            document.getElementById('msgBox').classList.add('hidden');
            overlay.classList.remove('hidden');
            statClose.innerText = '-';

            try {
                // พยายามโหลดข้อมูลจริง
                currentData = await fetchRealMarketData(symbol, range);
                candlestickSeries.setData(currentData);
                chart.timeScale().fitContent(); 
                statClose.innerText = currentData[currentData.length - 1].close.toFixed(2);
                drawSRLines();
            } catch (err) {
                console.error(err);
                // ถ้าล่ม โหลดข้อมูลจำลอง (Fallback) ให้ผู้ใช้เห็นกราฟทำงาน
                currentData = generateMockData(200);
                candlestickSeries.setData(currentData);
                chart.timeScale().fitContent();
                statClose.innerText = currentData[currentData.length - 1].close.toFixed(2);
                drawSRLines();
                
                // แจ้งเตือนสีเหลือง
                showMessage('warning', 'เซิร์ฟเวอร์ดึงข้อมูลขัดข้องชั่วคราว ระบบกำลังแสดง "ข้อมูลจำลอง" เพื่อให้คุณทดสอบฟีเจอร์แนวรับ-แนวต้านไปก่อน');
            } finally {
                overlay.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const dataList = document.getElementById('stock-list');
            for (const [ticker, name] of Object.entries(popularStocks)) {
                const option = document.createElement('option');
                option.value = ticker;
                option.text = name;
                dataList.appendChild(option);
            }

            initChart();
            
            // ดีเลย์เล็กน้อยก่อนโหลดข้อมูลแรก เพื่อให้กราฟสร้าง Container บนมือถือเสร็จก่อน
            setTimeout(loadStock, 500);

            document.getElementById('loadBtn').addEventListener('click', loadStock);
            document.getElementById('symbolInput').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') { e.target.blur(); loadStock(); }
            });
            document.getElementById('rangeSelect').addEventListener('change', loadStock);

            document.getElementById('toggleSR').addEventListener('click', () => {
                isSRVisible = !isSRVisible;
                const indicator = document.getElementById('toggleIndicator');
                const text = document.getElementById('toggleSRText');
                const dot = indicator.querySelector('div');

                if (isSRVisible) {
                    indicator.classList.remove('bg-gray-600'); indicator.classList.add('bg-blue-500');
                    dot.classList.remove('left-1'); dot.classList.add('right-1');
                    text.innerText = 'ซ่อนแนวรับ-แนวต้าน';
                } else {
                    indicator.classList.remove('bg-blue-500'); indicator.classList.add('bg-gray-600');
                    dot.classList.remove('right-1'); dot.classList.add('left-1');
                    text.innerText = 'แสดงแนวรับ-แนวต้าน';
                }
                drawSRLines();
            });
        });
    </script>
</body>
</html>
