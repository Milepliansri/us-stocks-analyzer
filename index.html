<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>US Stocks - Safe Mode</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0b0e14; color: #d1d4dc; font-family: sans-serif; margin: 0; padding: 0; }
        /* กำหนดความสูงกราฟให้ตายตัวไปเลย ป้องกันมือถือบีบจอ */
        #chartContainer { width: 100%; height: 50vh; min-height: 350px; background-color: #131722; border-bottom: 2px solid #2a2e39; }
    </style>
</head>
<body class="flex flex-col w-full h-full">

    <!-- Header เล็กๆ -->
    <header class="p-3 bg-[#1e222d] flex justify-between items-center border-b border-gray-800">
        <h1 class="text-white font-bold text-lg">📈 US Stocks (Safe Mode)</h1>
        <span class="text-xs bg-green-900 text-green-400 px-2 py-1 rounded-full">Offline Demo</span>
    </header>

    <!-- กราฟอยู่ด้านบนสุดเสมอ -->
    <div id="chartContainer"></div>

    <!-- ส่วนควบคุมอยู่ด้านล่าง สามารถเลื่อนจอลงมาดูได้ -->
    <div class="p-4 flex-grow bg-[#0b0e14]">
        
        <div class="mb-4">
            <p class="text-sm text-gray-400 mb-2">เพื่อแก้ปัญหากราฟไม่ขึ้น เวอร์ชันนี้จะใช้ "ข้อมูลจำลอง (Mock Data)" แบบไม่ต้องใช้อินเทอร์เน็ต เพื่อทดสอบว่าเบราว์เซอร์ของคุณวาดกราฟได้ปกติหรือไม่</p>
            
            <button id="btnNewData" class="w-full bg-blue-600 active:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg shadow-lg mb-3">
                🔄 สุ่มกราฟใหม่ (Refresh Data)
            </button>

            <button id="btnToggleSR" class="w-full bg-gray-700 active:bg-gray-800 text-white font-bold py-3 px-4 rounded-lg shadow-lg">
                📏 เปิด/ปิด เส้นแนวรับ-แนวต้าน
            </button>
        </div>

        <div class="bg-[#1e222d] p-4 rounded-lg">
            <div class="flex justify-between mb-2">
                <span class="text-gray-400">ราคาล่าสุด:</span>
                <span id="txtClose" class="text-white font-bold">-</span>
            </div>
            <div class="flex justify-between mb-2">
                <span class="text-gray-400">แนวต้าน (ต้านขึ้น):</span>
                <span id="txtRes" class="text-red-400 font-bold">-</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-400">แนวรับ (รับลง):</span>
                <span id="txtSup" class="text-green-400 font-bold">-</span>
            </div>
        </div>

        <!-- กล่องดักจับ Error (ถ้าโค้ดพัง จะโชว์ตรงนี้) -->
        <div id="errorBox" class="mt-4 p-3 bg-red-900/50 border border-red-500 rounded-lg hidden">
            <p class="text-red-400 font-bold text-sm">⚠️ พบปัญหาการทำงาน:</p>
            <p id="errorText" class="text-red-300 text-xs mt-1 break-words"></p>
        </div>

    </div>

    <script>
        // ระบบดักจับ Error อัตโนมัติเผื่อมือถือมีปัญหา
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('errorBox').classList.remove('hidden');
            document.getElementById('errorText').innerText = message + " (Line: " + lineno + ")";
        };

        let chart;
        let series;
        let chartData = [];
        let srLines = [];
        let isSRVisible = true;

        // สร้างข้อมูลจำลองแบบสุ่ม (ไม่พึ่งพาเซิร์ฟเวอร์)
        function generateData() {
            let data = [];
            let time = new Date();
            time.setDate(time.getDate() - 150);
            let price = 100 + Math.random() * 50;

            for (let i = 0; i < 150; i++) {
                time.setDate(time.getDate() + 1);
                if (time.getDay() === 0 || time.getDay() === 6) continue; // ข้ามเสาร์-อาทิตย์
                
                let open = price;
                let change = open * 0.05 * (Math.random() - 0.48); // สุ่มความผันผวน
                let close = open + change;
                let max = Math.max(open, close);
                let min = Math.min(open, close);
                let high = max + (Math.random() * 3);
                let low = min - (Math.random() * 3);

                // แปลงวันที่เป็น YYYY-MM-DD
                let y = time.getFullYear();
                let m = String(time.getMonth() + 1).padStart(2, '0');
                let d = String(time.getDate()).padStart(2, '0');

                data.push({ time: `${y}-${m}-${d}`, open, high, low, close });
                price = close;
            }
            return data;
        }

        // เริ่มต้นสร้างกราฟ
        function initChart() {
            const container = document.getElementById('chartContainer');
            
            // กำหนดขนาดให้ชัดเจนตามกล่อง
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: container.clientHeight,
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
                timeScale: { timeVisible: true }
            });

            series = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350'
            });

            // ปรับขนาดเวลากลับหน้าจอ (หมุนจอ)
            window.addEventListener('resize', () => {
                chart.resize(container.clientWidth, container.clientHeight);
            });
        }

        // คำนวณแนวรับแนวต้านแบบง่ายๆ
        function calcSR(data) {
            let res = [], sup = [];
            let lookback = 10;
            for (let i = lookback; i < data.length - lookback; i++) {
                let isH = true, isL = true;
                for (let j = 1; j <= lookback; j++) {
                    if (data[i-j].high > data[i].high || data[i+j].high > data[i].high) isH = false;
                    if (data[i-j].low < data[i].low || data[i+j].low < data[i].low) isL = false;
                }
                if (isH) res.push(data[i].high);
                if (isL) sup.push(data[i].low);
            }
            // คืนค่าเส้นล่าสุด 2 เส้น
            return { res: res.slice(-2), sup: sup.slice(-2) };
        }

        // วาดกราฟและเส้น
        function updateChart() {
            try {
                // เคลียร์เส้นเก่า
                srLines.forEach(l => series.removePriceLine(l));
                srLines = [];

                // อัปเดตข้อมูลกราฟ
                chartData = generateData();
                series.setData(chartData);
                chart.timeScale().fitContent();

                let lastClose = chartData[chartData.length - 1].close;
                document.getElementById('txtClose').innerText = lastClose.toFixed(2);

                // วาดเส้นแนวรับแนวต้าน
                if (isSRVisible) {
                    let { res, sup } = calcSR(chartData);
                    
                    res.forEach(p => {
                        let l = series.createPriceLine({ price: p, color: '#ff5252', lineWidth: 2, lineStyle: 2, title: 'Res' });
                        srLines.push(l);
                    });
                    sup.forEach(p => {
                        let l = series.createPriceLine({ price: p, color: '#00e676', lineWidth: 2, lineStyle: 2, title: 'Sup' });
                        srLines.push(l);
                    });

                    document.getElementById('txtRes').innerText = res.length > 0 ? Math.min(...res).toFixed(2) : '-';
                    document.getElementById('txtSup').innerText = sup.length > 0 ? Math.max(...sup).toFixed(2) : '-';
                } else {
                    document.getElementById('txtRes').innerText = '-';
                    document.getElementById('txtSup').innerText = '-';
                }

            } catch (err) {
                // ฟ้อง Error ขึ้นหน้าจอ
                document.getElementById('errorBox').classList.remove('hidden');
                document.getElementById('errorText').innerText = err.toString();
            }
        }

        // ผูกปุ่มกด
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            updateChart(); // วาดกราฟทันทีตอนเปิดหน้าเว็บ

            document.getElementById('btnNewData').addEventListener('click', updateChart);
            
            document.getElementById('btnToggleSR').addEventListener('click', () => {
                isSRVisible = !isSRVisible;
                updateChart(); // สั่งวาดใหม่
            });
        });

    </script>
</body>
</html>
